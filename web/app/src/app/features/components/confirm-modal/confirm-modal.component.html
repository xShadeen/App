<div class="backdrop" *ngIf="isOpen()">
  <div class="modal">
    <h2>{{ title() }}</h2>
    <p>{{ message() }}</p>

    <div class="actions">
      <button class="cancel" (click)="cancel.emit()">Cancel</button>
      <button class="confirm" (click)="confirm.emit()">Confirm</button>
    </div>
  </div>
</div>
